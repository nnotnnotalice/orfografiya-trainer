<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Орфография</title>
<link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="./assets/icons/favicon.svg">
<style>
  :root {
    --bg: #FAF8F5;
    --card: #ffffff;
    --text: #0F172A;
    --muted: #7A7060;
    --border: #FFF9E9;
    --accent: #3F58BB;
    --accent-hover: #333F8C;
    --error: #FAEADA;
    --error-text: #7A3508;
    --radius: 24px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Onest", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  .hidden { display: none !important; }

  .login-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
  }
  .login-shell {
    width: min(100%, 480px);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 48px;
  }
  .login-head {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }
  .login-icon {
    width: 64px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: visible;
  }
  .login-icon img {
    width: 96px;
    height: 96px;
    display: block;
    flex: 0 0 auto;
  }
  .login-title {
    font-size: 32px;
    font-weight: 700;
    line-height: normal;
    letter-spacing: 0;
  }
  .login-card {
    width: 100%;
    max-width: 480px;
    background: var(--card);
    border-radius: 24px;
    padding: 48px;
    box-shadow: 0 4px 8px rgba(46,56,89,.1);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
    animation: fadeUp .3s ease both;
  }
  .login-field {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    text-align: center;
  }
  .login-label {
    font-size: 24px;
    font-weight: 600;
    line-height: normal;
    color: #111827;
  }
  .code-input-wrap {
    position: relative;
    display: block;
    width: 100%;
  }
  .code-input-wrap::after {
    content: "";
    display: none;
    position: absolute;
    left: 17px;
    top: 50%;
    width: 2px;
    height: 24px;
    border-radius: 999px;
    background: var(--accent);
    transform: translateY(-50%);
    pointer-events: none;
    animation: caretBlink 1s steps(1, end) infinite;
  }
  .code-input-wrap.is-empty::after {
    display: block;
  }
  .input {
    width: 100%;
    height: 56px;
    padding: 0 16px;
    border: 1px solid var(--border);
    border-radius: 12px;
    font-size: 16px;
    font-family: inherit;
    outline: none;
    background: var(--bg);
    color: var(--text);
    caret-color: var(--accent);
    transition: border-color .2s, box-shadow .2s;
  }
  .code-input-wrap.is-empty .input {
    caret-color: transparent;
  }
  .input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(63,78,168,.12);
  }
  .btn {
    width: 100%;
    height: 48px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    box-shadow: 0 10px 10px rgba(99,102,241,.19);
    transition: background .2s, transform .15s, box-shadow .2s;
  }
  .btn:hover {
    background: var(--accent-hover);
    box-shadow: 0 12px 12px rgba(99,102,241,.22);
    transform: translateY(-1px);
  }
  .btn:disabled { opacity: .5; cursor: default; transform: none; box-shadow: none; }
  .login-error {
    color: var(--error-text);
    background: var(--error);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 13px;
  }

  /* ── экран навигации по темам ── */
  #screenMain {
    min-height: 100vh;
    background: var(--bg);
  }
  .topics-header {
    position: relative;
    height: 80px;
    padding: 0 40px;
    background: linear-gradient(90deg, #3F58BB 0%, #233CA1 100%);
    color: #fff9e9;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .topics-header h1 {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    font-size: 35px;
    font-weight: 600;
    line-height: normal;
    white-space: nowrap;
  }
  .logout-btn {
    width: 50px;
    height: 50px;
    background: transparent;
    border: 0;
    border-radius: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform .18s ease;
  }
  .logout-btn:hover {
    transform: translateY(-2px) scale(1.03);
    box-shadow: none;
  }
  .logout-btn:active {
    transform: translateY(1px) scale(.99);
  }
  .logout-btn img {
    width: 34px;
    height: 34px;
    display: block;
  }
  .student-pill {
    justify-self: end;
    background: rgba(250,248,245,.9);
    color: #1E2937;
    border-radius: 999px;
    padding: 8px 12px;
    font-size: 14px;
    font-weight: 700;
    line-height: normal;
    white-space: nowrap;
  }

  .topics-page {
    width: 100%;
    padding: 40px;
  }
  .topic-filters {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }
  .topic-filter {
    min-height: 32px;
    padding: 8px 16px;
    border-radius: 999px;
    border: 1px solid #FCCC6B;
    background: #FFF8E7;
    color: #1F2937;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background .2s, color .2s, border-color .2s, transform .15s;
    white-space: nowrap;
  }
  .topic-filter:hover { transform: translateY(-1px); }
  .topic-filter.active {
    background: #3750B3;
    border-color: #3750B3;
    color: #FAF8F5;
    font-weight: 700;
  }

  .topics-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0,1fr));
    gap: 24px;
    align-items: start;
  }

  .topic-card {
    min-width: 0;
    background: #fff;
    border-radius: 20px;
    padding: 24px;
    box-shadow: 0 4px 20px rgba(0,0,0,.05);
    display: flex;
    flex-direction: column;
    gap: 20px;
    overflow: hidden;
    animation: cardEnter .55s cubic-bezier(.2,.8,.2,1) both;
    transition: box-shadow .2s ease, min-height .28s ease;
  }
  .topic-card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
  }
  .topic-title {
    min-width: 0;
    color: #1F2937;
    font-size: 20px;
    font-weight: 600;
    line-height: normal;
  }
  .topic-badge {
    flex: 0 0 auto;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    line-height: normal;
    white-space: nowrap;
    background: #D9E1FE;
    color: #3F58BB;
  }
  .topic-badge.completed { background: #dcfce7; color: #166534; }
  .topic-badge.not-started { background: #f4f6f8; color: #94a3b8; }

  .topic-progress { display: flex; flex-direction: column; gap: 8px; }
  .topic-progress-text {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    color: #6B7280;
    font-size: 14px;
    font-weight: 400;
    line-height: normal;
  }
  .topic-progress-bar {
    width: 100%;
    height: 8px;
    border-radius: 4px;
    background: #FAF8F5;
    overflow: hidden;
  }
  .topic-progress-fill { height: 100%; border-radius: 4px; background: #fccc6b; transition: width .5s ease; }

  .topic-problems {
    width: 100%;
    overflow: hidden;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
  }
  .topic-problems-toggle, .topic-no-errors {
    width: 100%;
    min-height: 36px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 12px 16px;
    border: 0;
    border-radius: 12px;
    font-family: inherit;
    font-size: 14px;
    line-height: normal;
    text-align: left;
  }
  .topic-problems-toggle {
    background: #FFF8E7;
    color: #1F2937;
    font-weight: 500;
    cursor: pointer;
  }
  .topic-card.expanded .topic-problems-toggle {
    border-radius: 12px 12px 0 0;
  }
  .topic-problems-title {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .topic-problems-title img,
  .topic-chev {
    width: 16px;
    height: 16px;
    display: block;
    flex: 0 0 auto;
  }
  .topic-chev { transition: transform .2s; }
  .topic-chev.closed { transform: rotate(180deg); }
  .topic-no-errors {
    background: #DCFCE7;
    color: #15803D;
    font-weight: 600;
    cursor: default;
    border-radius: 12px;
  }
  .topic-problems-panel {
    display: grid;
    grid-template-rows: 0fr;
    overflow: hidden;
    opacity: 0;
    background: #FFF8E7;
    border-radius: 0 0 12px 12px;
    transition: grid-template-rows .32s ease, opacity .22s ease;
  }
  .topic-card.expanded .topic-problems-panel {
    grid-template-rows: 1fr;
    opacity: 1;
  }
  .topic-problem-chips {
    min-height: 0;
    overflow: hidden;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: flex-start;
    padding: 0 16px;
    transition: padding .32s ease;
  }
  .topic-card.expanded .topic-problem-chips {
    padding: 16px 16px 24px;
  }
  .topic-problem-chip {
    display: inline-flex;
    align-items: center;
    min-height: 28px;
    padding: 6px 12px;
    border-radius: 6px;
    background: #FEF3C7;
    color: #D97706;
    font-size: 14px;
    font-weight: 500;
    line-height: normal;
  }
  .topic-start-btn {
    width: 100%;
    height: 42px;
    border: 0;
    border-radius: 12px;
    background: #FF4852;
    color: #fff;
    font-family: inherit;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background .2s, transform .15s;
  }
  .topic-start-btn:hover { background: #f43d48; }
  .topic-start-btn img {
    width: 26px;
    height: 26px;
    display: block;
  }

  .topics-empty { text-align: center; color: var(--muted); padding: 60px 20px; font-size: 14px; line-height: 1.6; }

  .loader-overlay {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(250, 248, 245, .72);
    backdrop-filter: blur(8px);
    z-index: 1000;
  }
  .loader {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    border: 5px solid #EEF0FF;
    border-top-color: var(--accent);
    animation: spin .75s linear infinite;
  }

  /* ── экран механики «Выбери букву» ── */
  #screenExercise {
    min-height: 100vh;
    background: var(--bg);
    display: flex;
    flex-direction: column;
  }
  #screenExercise .student-pill { display: none !important; }
  .exercise-header {
    position: relative;
    min-height: 80px;
    padding: 12px 40px 20px;
    background: linear-gradient(90deg, #3F58BB 0%, #233CA1 100%);
    display: grid;
    grid-template-columns: 50px minmax(0, 1fr) 50px;
    align-items: center;
    gap: 20px;
    flex: 0 0 auto;
  }
  .exercise-back-btn {
    width: 50px;
    height: 50px;
    background: transparent;
    border: 0;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    border-radius: 12px;
    transition: transform .18s ease;
    z-index: 1;
  }
  .exercise-back-btn:hover {
    transform: translateY(-2px) scale(1.03);
    box-shadow: none;
  }
  .exercise-back-btn:active {
    transform: translateY(1px) scale(.99);
  }
  .exercise-back-btn img {
    width: 26px;
    height: 26px;
    display: block;
    filter: none;
  }
  .exercise-title {
    grid-column: 2;
    justify-self: center;
    width: min(640px, 100%);
    color: #fff9e9;
    font-size: 35px;
    font-weight: 600;
    line-height: 1.12;
    text-align: center;
    padding: 0;
    white-space: normal;
    overflow-wrap: anywhere;
    word-break: normal;
  }
  .exercise-progress-track {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    width: 100%;
    height: 8px;
    background: #E5E7EB;
    overflow: hidden;
  }
  .exercise-progress-fill {
    height: 100%;
    width: 0%;
    background: #FCCC6B;
    border-radius: 0 4px 4px 0;
    transition: width .45s cubic-bezier(.22,1,.36,1);
  }

  .exercise-body {
    min-height: 0;
    flex: 1;
    width: 100%;
    padding: clamp(72px, 10vh, 120px) 24px clamp(64px, 9vh, 104px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    gap: clamp(40px, 5vh, 72px);
    position: relative;
  }
  .exercise-prompt {
    width: min(100%, 680px);
    min-height: 81px;
    padding: 24px;
    border-radius: 24px;
    background: #FFF3C4;
    color: #111827;
    font-size: 24px;
    font-weight: 500;
    line-height: 1.35;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 12px;
    position: relative;
    overflow: hidden;
  }
  .exercise-prompt::before {
    content: "";
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 4px;
    background: #FCCC6B;
  }
  .exercise-prompt img {
    width: 28px;
    height: 28px;
    flex: 0 0 auto;
  }
  .exercise-word-card {
    width: min(100%, 720px);
    min-height: clamp(96px, 13vh, 140px);
    padding: 0 48px;
    border-radius: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .exercise-word {
    max-width: 100%;
    color: #233CA1;
    font-size: 48px;
    font-weight: 600;
    line-height: 1.25;
    text-align: center;
    overflow-wrap: normal;
    word-break: normal;
  }
  .exercise-word-piece {
    display: inline-block;
    max-width: 100%;
    white-space: nowrap;
  }
  .exercise-gap {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 50px;
    min-height: 60px;
    margin: 0 4px;
    padding: 4px 16px;
    border: 0;
    border-radius: 12px;
    background: #FFF5E0;
    color: #D97706;
    font-weight: 600;
    line-height: 1;
    vertical-align: middle;
    box-shadow: inset 0 2px 4px rgba(217,140,26,.15);
    transition: background .18s, color .18s, border-color .18s, transform .18s;
  }
  .exercise-gap-letter {
    display: inline-block;
    position: relative;
    top: -2px;
    font-size: inherit;
    font-weight: inherit;
    line-height: 1;
    animation: letterSwap .2s ease-out;
  }
  .exercise-gap.selecting,
  .exercise-gap.preview { transform: none; }
  .exercise-gap.checking { opacity: .72; transform: scale(.98); }
  .exercise-gap.correct { color: #176B3A; border-color: #86D39B; background: #DFF7EA; }
  .exercise-gap.wrong { color: #B4232B; border-color: #E24B4A; background: #FFE0E0; }

  .answer-options {
    width: 100%;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    gap: 16px;
    transform: none;
  }
  .answer-area {
    width: min(100%, 640px);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }
  .answer-option {
    min-width: 104px;
    min-height: 80px;
    padding: 0 32px;
    border-radius: 16px;
    border: 1px solid #E8E2D8;
    background: #FFFDF7;
    color: #111827;
    box-shadow: 0 4px 0 rgba(102,82,41,.2), 0 8px 20px rgba(115,92,46,.18);
    font-family: inherit;
    font-size: 48px;
    font-weight: 600;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform .15s ease, background .18s ease, color .18s ease, border-color .18s ease, box-shadow .18s ease;
  }
  .answer-option.option-enter,
  .explain-opt.option-enter {
    animation: quizOptionIn .46s cubic-bezier(.22,1,.36,1) both;
  }
  .answer-option:hover,
  .answer-option:focus-visible {
    outline: none;
    transform: translateY(-2px);
    box-shadow: 0 6px 0 rgba(102,82,41,.18), 0 12px 24px rgba(115,92,46,.2);
  }
  .answer-option:active:not(:disabled) {
    transform: translateY(3px) scale(.995);
    box-shadow: 0 1px 0 rgba(102,82,41,.24), 0 4px 12px rgba(115,92,46,.14), inset 0 2px 4px rgba(255,255,255,.6);
  }
  .answer-option.active {
    background: #FCCC6B;
    color: #D97706;
    border-color: transparent;
    box-shadow: 0 4px 0 rgba(217,119,6,.25), 0 10px 22px rgba(252,204,107,.28);
  }
  .answer-option.correct {
    background: #DCFCE7;
    border-color: transparent;
    color: #111827;
    box-shadow: 0 4px 0 rgba(102,82,41,.2), 0 8px 20px rgba(115,92,46,.18), inset 0 2px 4px rgba(255,255,255,.6);
    animation: correctPulse .44s ease both;
  }
  .answer-option.wrong {
    background: #FEE2E2;
    border-color: transparent;
    color: #111827;
    box-shadow: 0 4px 0 rgba(102,82,41,.2), 0 8px 20px rgba(115,92,46,.18), inset 0 2px 4px rgba(255,255,255,.6);
    animation: wrongShake .34s ease both;
  }
  .answer-option:disabled { cursor: default; opacity: 1; }
  .exercise-shortcuts {
    background: #fff;
    border: 1px solid #E5E7EB;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,.05);
    color: #6B7280;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: .02em;
    line-height: normal;
    padding: 12px 24px;
    white-space: nowrap;
  }
  .exercise-shortcuts strong { color: #1F2937; }

  /* ── финальные экраны сессии ── */
  #screenResult {
    min-height: 100vh;
    padding: 0 24px 80px;
    background: var(--bg);
  }
  .result-screen-content {
    width: 100%;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    z-index: 0;
  }
  .result-screen-content.success,
  .result-screen-content.finished {
    justify-content: flex-start;
    gap: 90px;
    padding-top: 150px;
  }
  .result-screen-content.error {
    justify-content: flex-start;
    gap: 60px;
    padding: 80px 56px 0;
  }
  .result-headline {
    width: 100%;
    position: relative;
    text-align: center;
    z-index: 2;
  }
  .summary-congrats {
    width: 100%;
    margin: 0;
    color: #1F2937;
    font-size: 48px;
    line-height: normal;
    font-weight: 600;
    letter-spacing: 0;
    text-align: center;
    animation: popIn .42s ease both;
  }
  .summary-subtitle {
    width: 100%;
    margin: 0;
    color: #1F2937;
    font-size: 32px;
    line-height: normal;
    font-weight: 600;
    letter-spacing: 0;
    text-align: center;
  }
  .summary-list-wrapper {
    width: 100%;
    margin: 0;
    text-align: center;
  }
  .summary-list {
    width: 100%;
    max-width: 860px;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 12px;
    margin: 0 auto;
    padding: 0;
    list-style: none;
  }
  .summary-list li {
    display: inline-flex;
    align-items: center;
    min-height: 49px;
    padding: 12px 24px;
    border-radius: 6px;
    background: #E4F8EC;
    color: #0A9F43;
    font-size: 20px;
    line-height: normal;
    font-weight: 600;
    white-space: nowrap;
    animation: optionIn .24s ease both;
  }
  .result-buttons {
    width: 480px;
    max-width: calc(100vw - 48px);
    display: flex;
    flex-direction: column;
    align-items: stretch;
    justify-content: flex-start;
    gap: 16px;
    position: relative;
    z-index: 2;
  }
  .result-btn {
    width: 100%;
    min-height: 62px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 20px 40px;
    border: 0;
    border-radius: 999px;
    background: #233CA1;
    color: #FAF8F5;
    box-shadow: none;
    font-family: inherit;
    font-size: 18px;
    line-height: normal;
    font-weight: 600;
    white-space: normal;
    cursor: pointer;
    transition: transform .18s ease, filter .18s ease;
  }

let currentStudentId = null;

// ── формат кода — как в index.html (домашка): нижний регистр, дефисы ──
function normalizeCode(raw) {
  return (raw || "").trim().toLowerCase().replace(/\s+/g, "-");
}

function getSavedCode() { return localStorage.getItem(LOCAL_KEY) || ""; }
function saveCode(c) { currentStudentId = c; localStorage.setItem(LOCAL_KEY, c); }
function clearCode() { currentStudentId = null; localStorage.removeItem(LOCAL_KEY); }

// ── вход по коду — логика как в index.html: без привязки к устройству, ──
// ── код можно использовать с любого числа устройств одновременно ──
async function loginWithCode(rawCode) {
  const code = normalizeCode(rawCode);
  if (!code) { showLoginError("Введи свой код"); return; }

  setLoginLoading(true);
  try {
    await auth.signInAnonymously();
    const uid = auth.currentUser.uid;
    const ref = db.collection("students").doc(code);
    const snap = await ref.get();
    if (!snap.exists) {
      showLoginError("Код не найден. Спроси репетитора.");
      setLoginLoading(false);
      return;
    }
    await ref.update({
      student_id: code,
      owner_uid: uid,
      last_seen_at: firebase.firestore.FieldValue.serverTimestamp()
    });
    saveCode(code);
    showMain();
  } catch (e) {
    console.error(e);
    showLoginError("Что-то пошло не так. Попробуй ещё раз.");
    setLoginLoading(false);
  }
}

function showLoginError(msg) {
  const el = document.getElementById("loginError");
  el.textContent = msg;
  el.classList.remove("hidden");
}
function setLoginLoading(on) {
  const btn = document.getElementById("loginBtn");
  btn.disabled = on;
  btn.textContent = on ? "Проверяю…" : "Войти";
  setLoading(on);
}

function setLoading(isLoading) {
  document.getElementById("loaderOverlay")?.classList.toggle("hidden", !isLoading);

let wordsData = {};      // { topicId: { title, category, categoryTitle, mechanic, words: [...] } }
let categoryOrder = [];  // порядок фильтров сверху, как в таблице
let currentCategoryFilter = "Все";

function parseCSV(text) {
  const rows = [];
  let row = [];
  let field = "";
  let inQuotes = false;
  const s = text.replace(/\r\n/g, "\n").replace(/\r/g, "\n");

  for (let i = 0; i < s.length; i++) {
    const c = s[i];
    if (inQuotes) {
      if (c === '"') {
        if (s[i + 1] === '"') { field += '"'; i++; }
        else { inQuotes = false; }
      } else {
        field += c;
      }
    } else {
      if (c === '"') { inQuotes = true; }
      else if (c === ",") { row.push(field); field = ""; }
      else if (c === "\n") { row.push(field); rows.push(row); row = []; field = ""; }
      else { field += c; }
    }
  }
  if (field.length || row.length) { row.push(field); rows.push(row); }
  return rows.filter(r => !(r.length === 1 && r[0] === ""));
}

function splitOptions(str) {
  return (str || "").split(";").map(s => s.trim()).filter(Boolean);
}

async function loadWordsFromSheet() {
  let csvText = WORDS_CSV_SNAPSHOT || "";

  if (SHEET_CSV_URL) {
    try {
      const res = await fetch(`${SHEET_CSV_URL}&_=${Date.now()}`, { cache: "no-store" });
      if (!res.ok) throw new Error("Не удалось загрузить таблицу со словами");
      csvText = await res.text();
    } catch (e) {
      if (!csvText) throw e;
      console.warn("Google CSV не загрузился, использую локальный снимок таблицы", e);
    }
  }

  if (!csvText) { wordsData = {}; categoryOrder = []; return; }
  const rows = parseCSV(csvText);
  const headers = rows[0].map(h => h.trim());
  const result = {};
  const catOrder = [];

  rows.slice(1).forEach(row => {
    const item = {};
    headers.forEach((h, i) => { item[h] = (row[i] || "").trim(); });
    if (String(item.is_active).toUpperCase() !== "TRUE") return;

    // ── фактическое назначение колонок в твоей таблице ──
    // D (заголовок "topic_title") = слаг темы, group key для карточек: proveryaemye-glasnye
    // A (заголовок "category_title") = название вкладки-фильтра сверху: Корень / Объяснение орфограмм
    // B (заголовок "topic_id") = человекочитаемое название: либо название темы (choose_letter),
    //                             либо конкретное правило внутри "Объяснения орфограмм" (explain)
    const tabTitle = item.category_title || item.category || "Другое";
    const mechanic = item.mechanic || "choose_letter";
    const baseTopicSlug = item.topic_title;
    if (!baseTopicSlug || !item.word_id) return;

    const ruleSlug = normalizeCode(item.topic_id || baseTopicSlug);
    const topicSlug = mechanic === "explain" ? `${baseTopicSlug}__${ruleSlug}` : baseTopicSlug;

    if (!result[topicSlug]) {
      result[topicSlug] = {
        // для explain отдельная карточка на каждую орфограмму/правило,
        // для choose_letter — из читаемого названия темы (колонка B)
        title: item.topic_id || (mechanic === "explain" ? tabTitle : baseTopicSlug),
        tabTitle: tabTitle,
        mechanic: mechanic,
        words: []
      };
    }
    if (!catOrder.includes(tabTitle)) catOrder.push(tabTitle);

    // word_id в таблице — номер внутри темы, может повторяться между темами.
    // Для explain теперь включаем конкретную орфограмму в id, а старый id
    // оставляем как legacy, чтобы уже сохранённый прогресс продолжал учитываться.
    const legacyWordId = `${baseTopicSlug}-${item.word_id}`;
    const globalWordId = `${topicSlug}-${item.word_id}`;

    result[topicSlug].words.push({
      word_id: globalWordId,
      legacy_word_id: legacyWordId,
      topic_slug: topicSlug,
      ruleLabel: item.topic_id || "",       // конкретное правило — для статистики по ошибкам в объяснениях
      category: item.category,
      mechanic: mechanic,
      word_display: item.word_display,
      correct_letter: item.correct_letter,
      wheel_options: splitOptions(item.wheel_options),
      correct_rule: item.correct_rule,
      wrong_rules: splitOptions(item.wrong_rules)
    });
  });

  wordsData = result;
  categoryOrder = catOrder;
}

// ── прогресс по словам — тот же паттерн, что в тренажёре ударений ──
function getProgressStorageKey() { return `orfo_seenWords_${currentStudentId}`; }
function getSeenWords() {
  try { return JSON.parse(localStorage.getItem(getProgressStorageKey()) || "{}"); }
  catch (e) { return {}; }
}
function saveSeenWords(seenWords) { localStorage.setItem(getProgressStorageKey(), JSON.stringify(seenWords)); }

async function loadSeenWordsFromFirebase(studentId) {
  const snap = await db.collection("students").doc(studentId)
    .collection("trainerProgress").doc("orfogrammy")
    .collection("wordProgress").get();
  const fromFirebase = {};
  const migrations = [];

  snap.forEach(doc => {
    const entry = doc.data();
    const word = findWordDefinitionByProgressId(doc.id);
    if (word && !entry.problem_display_word) {
      entry.problem_display_word = buildProblemDisplayWord(word);
      migrations.push(doc.ref.set({ problem_display_word: entry.problem_display_word }, { merge: true }));
    }
    fromFirebase[doc.id] = entry;
  });

  saveSeenWords({ ...getSeenWords(), ...fromFirebase });
  if (migrations.length) {
    Promise.allSettled(migrations).catch(e => {
      console.warn("Не удалось обновить короткие названия проблемных слов", e);
    });
  }
}

function findWordDefinitionByProgressId(progressId) {
  for (const topic of Object.values(wordsData)) {
    const word = topic.words.find(item => item.word_id === progressId || item.legacy_word_id === progressId);
    if (word) return word;
  }
  return null;
}

function getAllWordsByTopic(topicId) { return (wordsData[topicId] && wordsData[topicId].words) || []; }

function getSeenWordEntry(seen, word) {
  return seen[word.word_id] || (word.legacy_word_id ? seen[word.legacy_word_id] : null) || null;
}

function getProgressByTopic(topicId) {
  const all = getAllWordsByTopic(topicId);
  const seen = getSeenWords();
  const seenCount = all.filter(w => getSeenWordEntry(seen, w)).length;
  const totalCount = all.length;
  return { seenCount, totalCount, percent: totalCount ? Math.round(seenCount / totalCount * 100) : 0 };
}

function isUnresolved(item) {
  if (!item) return false;
  if (Number(item.correct_streak || 0) >= REVIEW_CORRECT_STREAK) return false;
  if (item.needs_review === true) return true;
  if (item.needs_review === false) return false;
  return Number(item.wrong_count || 0) > Number(item.correct_count || 0);
}

function getUnresolvedWordsByTopic(topicId) {
  const seen = getSeenWords();
  const entries = [];
  getAllWordsByTopic(topicId).forEach(word => {
    const progress = getSeenWordEntry(seen, word);
    if (isUnresolved(progress)) {
      entries.push({
        ...progress,
        word_id: word.word_id,
        problem_display_word: buildProblemDisplayWord(word)
      });
    }
  });
  return entries;
}

function wordCountLabel(n) {
  n = Math.abs(Number(n) || 0);
  const lastTwo = n % 100, lastOne = n % 10;
  return (lastOne === 1 && lastTwo !== 11) ? "слово" : (lastOne >= 2 && lastOne <= 4 && (lastTwo < 10 || lastTwo >= 20) ? "слова" : "слов");
}

function renderTopicFilters() {
  const wrap = document.getElementById("topicFilters");
  const tabs = ["Все", ...categoryOrder];
  wrap.innerHTML = tabs.map((t, i) =>
    `<button class="topic-filter${currentCategoryFilter === t ? " active" : ""}" data-tab="${escHtml(t)}">${escHtml(t)}</button>`
  ).join("");
  wrap.querySelectorAll(".topic-filter").forEach(btn => {
    btn.addEventListener("click", () => setCategoryFilter(btn.dataset.tab));
  });
}

function setCategoryFilter(tab) { currentCategoryFilter = tab; renderTopicFilters(); renderTopicsGrid(); }

function renderStudentPill() {
  const pill = document.getElementById("studentPill");
  if (!pill) return;
  pill.textContent = (currentStudentId || "").toUpperCase();
}

function renderTopicsGrid() {
  const grid = document.getElementById("topicsGrid");
  const topicSlugs = Object.keys(wordsData).filter(slug =>
    currentCategoryFilter === "Все" || wordsData[slug].tabTitle === currentCategoryFilter
  );

  if (!topicSlugs.length) {
    grid.innerHTML = `<div class="topics-empty">Пока нет ни одной темы. Как только таблица со словами будет готова, темы появятся здесь.</div>`;
    return;
  }

  grid.innerHTML = topicSlugs.map((topicSlug, index) => {
    const topic = wordsData[topicSlug];
    const progress = getProgressByTopic(topicSlug);
    const unresolved = getUnresolvedWordsByTopic(topicSlug);
    const isNotStarted = progress.seenCount === 0;
    const isCompleted = progress.totalCount > 0 && progress.seenCount >= progress.totalCount;
    const badgeClass = isCompleted ? "completed" : (isNotStarted ? "not-started" : "");
    const badgeText = isCompleted ? "Решено ✓" : (isNotStarted ? "Не начато" : "В процессе");

    const problemsHtml = unresolved.length
      ? `<div class="topic-problems">
           <button class="topic-problems-toggle" data-toggle="${escHtml(topicSlug)}" aria-expanded="false">
             <span class="topic-problems-title">
               <img src="./assets/icons/alert-circle.svg" alt="">
               <span>Проблемные слова</span>
             </span>
             <img class="topic-chev closed" data-chev="${escHtml(topicSlug)}" src="./assets/icons/chevron-up.svg" alt="">
           </button>
           <div class="topic-problems-panel" data-panel="${escHtml(topicSlug)}">
             <div class="topic-problem-chips">
               ${unresolved.map(w => `<span class="topic-problem-chip">${escHtml(w.problem_display_word || w.display_word || w.word_display || "")}</span>`).join("")}
             </div>
           </div>
         </div>`
      : (isNotStarted ? "" : `<div class="topic-no-errors">Ошибок нет</div>`);

    return `<div class="topic-card" style="animation-delay:${index * 80}ms">
      <div class="topic-card-header">

        <div class="topic-badge ${badgeClass}">${badgeText}</div>
      </div>

        <div class="topic-progress-text"><span>${progress.seenCount} / ${progress.totalCount} ${wordCountLabel(progress.totalCount)}</span><span>${progress.percent}%</span></div>
        <div class="topic-progress-bar"><div class="topic-progress-fill" style="width:${progress.percent}%"></div></div>
      </div>
      ${problemsHtml}
      <button class="topic-start-btn" data-start="${escHtml(topicSlug)}" aria-label="Начать">
        <img src="./assets/icons/play.svg" alt="">
      </button>
    </div>`;
  }).join("");

  grid.querySelectorAll("[data-toggle]").forEach(btn => {
    btn.addEventListener("click", () => toggleProblems(btn.dataset.toggle));
  });
  grid.querySelectorAll("[data-start]").forEach(btn => {

  });
}

function toggleProblems(topicSlug) {
  const panel = document.querySelector(`[data-panel="${CSS.escape(topicSlug)}"]`);
  const chev = document.querySelector(`[data-chev="${CSS.escape(topicSlug)}"]`);
  const button = document.querySelector(`[data-toggle="${CSS.escape(topicSlug)}"]`);
  const card = button?.closest(".topic-card");
  if (!panel || !chev || !button || !card) return;
  const shouldExpand = !card.classList.contains("expanded");

  document.querySelectorAll(".topic-card.expanded").forEach(openCard => {
    if (openCard === card) return;
    openCard.classList.remove("expanded");
    const openButton = openCard.querySelector(".topic-problems-toggle");
    const openChev = openCard.querySelector(".topic-chev");
    openButton?.setAttribute("aria-expanded", "false");
    openChev?.classList.add("closed");
  });

  card.classList.toggle("expanded", shouldExpand);
  chev.classList.toggle("closed", !shouldExpand);
  button.setAttribute("aria-expanded", String(shouldExpand));
}

// ── механика «Выбери букву» ──────────────────────────────────────────────
const SESSION_WORD_LIMIT = 12;
const REVIEW_CORRECT_STREAK = 3;
const SHORTCUTS_HINT_KEY = "orfo_shortcutsHintSeen";
const EXPLAIN_SHORTCUTS_HINT_KEY = "orfo_explainShortcutsHintSeen";

let sessionTopicSlug = null;
let sessionWords = [];
let sessionIndex = 0;
let sessionMistakes = [];
let sessionAnsweredIndexes = new Set();
let isReviewMode = false;
let lastErrorsForReview = [];

function getStudentScopedHintKey(baseKey) {
  return currentStudentId ? `${baseKey}_${currentStudentId}` : baseKey;
}

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildDisplayWord(word) {
  if (!word.word_display) return "";
  if (word.mechanic === "explain") return word.word_display.replace(/\[(.)\]/, "$1");
  return word.word_display.replace("_", word.correct_letter || "_");
}

function buildProblemDisplayWord(word) {
  const raw = word.word_display || "";
  const markerIndex = raw.indexOf("_") >= 0 ? raw.indexOf("_") : raw.search(/\[.\]/);
  if (markerIndex < 0) return buildDisplayWord(word).split(/\s+/)[0] || "";

  const before = raw.slice(0, markerIndex);
  const tokenStart = before.search(/\S*$/);
  const after = raw.slice(markerIndex);
  const tokenEndMatch = after.match(/\s/);
  const tokenEnd = tokenEndMatch ? markerIndex + tokenEndMatch.index : raw.length;
  const token = raw.slice(tokenStart < 0 ? 0 : tokenStart, tokenEnd);

  return token
    .replace("_", word.correct_letter || "_")
    .replace(/\[(.)\]/, "$1")
    .replace(/^[("']+|[)"',.;:!?]+$/g, "");
}

function buildSessionWords(topicSlug) {
  const topic = wordsData[topicSlug];
  const all = topic.words;
  const seen = getSeenWords();
  const byId = new Map(all.map(w => [w.word_id, w]));

  const unresolvedIds = getUnresolvedWordsByTopic(topicSlug).map(item => item.word_id);
  const unresolved = unresolvedIds.map(id => byId.get(id)).filter(Boolean);
  const usedIds = new Set(unresolved.map(w => w.word_id));

  const allSeen = all.every(w => getSeenWordEntry(seen, w));
  if (!allSeen) {
    const newWords = all.filter(w => !usedIds.has(w.word_id) && !getSeenWordEntry(seen, w));
    return [...unresolved, ...newWords].slice(0, SESSION_WORD_LIMIT);
  }
  const shuffled = shuffleArray(all.filter(w => !usedIds.has(w.word_id)));
  return [...unresolved, ...shuffled].slice(0, SESSION_WORD_LIMIT);
}

function startTopic(topicSlug) {
  const topic = wordsData[topicSlug];
  if (!topic) return;
  if (topic.mechanic !== "choose_letter") {
    startExplainTopic(topicSlug);
    return;
  }
  sessionTopicSlug = topicSlug;
  sessionWords = buildSessionWords(topicSlug);
  if (!sessionWords.length) { alert("В этой теме пока нет слов."); return; }
  sessionIndex = 0;
  sessionMistakes = [];
  sessionAnsweredIndexes = new Set();
  isReviewMode = false;
  lastErrorsForReview = [];
  document.getElementById("screenMain").classList.add("hidden");
  document.getElementById("screenResult").classList.add("hidden");
  document.getElementById("screenExercise").classList.remove("hidden");
  syncShortcutsHint();
  updateExerciseProgress();
  showQuestion();
}

function syncShortcutsHint() {
  const hint = document.getElementById("exerciseShortcuts");
  if (!hint) return;
  const key = getStudentScopedHintKey(SHORTCUTS_HINT_KEY);
  if (localStorage.getItem(key)) {
    hint.classList.add("hidden");
    return;
  }
  hint.classList.remove("hidden");
}

function completeShortcutsHint() {
  const hint = document.getElementById("exerciseShortcuts");
  const key = getStudentScopedHintKey(SHORTCUTS_HINT_KEY);
  localStorage.setItem(key, "1");
  hint?.classList.add("hidden");
}

function isDesktopNavigation() {
  return window.matchMedia?.("(hover: hover) and (pointer: fine)").matches;
}

function exitExercise() {
  document.getElementById("screenExercise").classList.add("hidden");
  document.getElementById("screenExplain")?.classList.add("hidden");
  document.getElementById("screenResult").classList.add("hidden");
  document.getElementById("screenMain").classList.remove("hidden");
  isReviewMode = false;
  renderTopicFilters();
  renderTopicsGrid();
}

function renderWordWithGap(wordDisplay, letter, state) {
  const idx = (wordDisplay || "").indexOf("_");
  if (idx === -1) return escHtml(wordDisplay || "");
  const before = wordDisplay.slice(0, idx);
  const after = wordDisplay.slice(idx + 1);
  const letterHtml = letter ? `<span class="exercise-gap-letter">${escHtml(letter)}</span>` : "";
  const gapHtml = `<span class="exercise-gap ${state || "preview"}">${letterHtml}</span>`;
  const beforeMatch = before.match(/^(.*?)(\S*)$/);
  const afterMatch = after.match(/^(\S*)([\s\S]*)$/);
  const prefix = beforeMatch ? beforeMatch[1] : "";
  const wordStart = beforeMatch ? beforeMatch[2] : before;
  const wordEnd = afterMatch ? afterMatch[1] : "";
  const suffix = afterMatch ? afterMatch[2] : "";
  return `${escHtml(prefix)}<span class="exercise-word-piece">${escHtml(wordStart)}${gapHtml}${escHtml(wordEnd)}</span>${escHtml(suffix)}`;
}

// ── выбор буквы кнопками ────────────────────────────────────────────────
let answerState = "idle"; // idle | preview | checking | correct | wrong
let answerOptions = [];
let answerSelectedIndex = -1;
let answerSelectionMode = "none"; // none | keyboard | pointer

function renderAnswerButtons() {
  const wrap = document.getElementById("answerOptions");
  wrap.className = `answer-options count-${answerOptions.length}`;
  wrap.innerHTML = answerOptions.map((opt, i) =>
    `<button type="button" class="answer-option option-enter${answerSelectionMode === "keyboard" && i === answerSelectedIndex ? " active" : ""}" data-answer="${i}" aria-label="Выбрать ${escHtml(opt)}" style="animation-delay:${i * 20}ms">${escHtml(opt)}</button>`
  ).join("");
  wrap.querySelectorAll(".answer-option").forEach(btn => {
    btn.addEventListener("click", () => selectAnswer(Number(btn.dataset.answer), true, "pointer"));
    btn.addEventListener("animationend", () => btn.classList.remove("option-enter"), { once: true });
  });
}

function updateAnswerButtons() {
  document.querySelectorAll(".answer-option").forEach((btn, i) => {
    btn.classList.toggle("active", answerSelectionMode === "keyboard" && i === answerSelectedIndex);
  });
}

function updateAnswerWord() {
  const word = sessionWords[sessionIndex];
  const letter = answerSelectedIndex >= 0 ? answerOptions[answerSelectedIndex] : "";
  document.getElementById("exerciseWord").innerHTML = renderWordWithGap(word.word_display, letter, answerState);
}

function updateExerciseProgress() {
  const percent = getSessionProgressPercent();
  const fill = document.getElementById("exerciseProgressFill");
  if (fill) fill.style.width = percent + "%";
}

function updateExplainProgress() {
  const percent = getSessionProgressPercent();
  const fill = document.getElementById("explainProgressFill");
  if (fill) fill.style.width = percent + "%";
}

function getSessionProgressPercent() {
  const total = sessionWords.length;
  const answered = Math.min(sessionAnsweredIndexes.size, total);
  return total ? Math.round((answered / total) * 100) : 0;
}

function registerAnsweredWord() {
  sessionAnsweredIndexes.add(sessionIndex);
  updateExerciseProgress();
  updateExplainProgress();
}

function selectAnswer(index, shouldSubmit, mode = "keyboard") {
  if (answerState === "checking" || answerState === "correct") return;
  answerSelectedIndex = index;
  answerSelectionMode = mode;
  answerState = "preview";
  updateAnswerButtons();
  updateAnswerWord();
  document.querySelector(`[data-answer="${index}"]`)?.focus();
  if (shouldSubmit) submitAnswer();
}

function selectAnswerNext() {
  selectAnswer(answerSelectedIndex < 0 ? 0 : (answerSelectedIndex + 1) % answerOptions.length, false, "keyboard");
}

function selectAnswerPrev() {
  selectAnswer(answerSelectedIndex < 0 ? answerOptions.length - 1 : (answerSelectedIndex - 1 + answerOptions.length) % answerOptions.length, false, "keyboard");
}

function onAnswerKeydown(e) {
  if (answerState === "checking" || answerState === "correct") return;
  if (e.key === "ArrowRight" || e.key === "ArrowDown") { e.preventDefault(); selectAnswerNext(); }
  else if (e.key === "ArrowLeft" || e.key === "ArrowUp") { e.preventDefault(); selectAnswerPrev(); }
  else if (e.key === "Enter" || e.key === " ") { e.preventDefault(); submitAnswer(); }
}

function submitAnswer() {
  if (answerState === "checking" || answerState === "correct") return;
  if (answerSelectedIndex < 0) return;
  answerState = "checking";
  updateAnswerWord();
  document.querySelectorAll(".answer-option").forEach(btn => btn.disabled = true);

  const word = sessionWords[sessionIndex];
  const letter = answerOptions[answerSelectedIndex];
  const isCorrect = letter === word.correct_letter;
  markWordAsSeen(word, isCorrect);

  const selectedBtn = document.querySelector(`[data-answer="${answerSelectedIndex}"]`);
  const correctIndex = answerOptions.findIndex(opt => opt === word.correct_letter);
  const correctBtn = correctIndex >= 0 ? document.querySelector(`[data-answer="${correctIndex}"]`) : null;
  if (isCorrect) {
    answerState = "correct";
    registerAnsweredWord();
    completeShortcutsHint();
    updateAnswerWord();
    selectedBtn?.classList.add("correct");
    setTimeout(() => { sessionIndex++; showQuestion(); }, 1200);
  } else {
    answerState = "wrong";
    updateAnswerWord();
    selectedBtn?.classList.add("wrong");
    correctBtn?.classList.add("correct");
    sessionMistakes.push(word);
    setTimeout(() => {
      answerState = "preview";
      selectedBtn?.classList.remove("wrong");
      correctBtn?.classList.remove("correct");
      document.querySelectorAll(".answer-option").forEach(btn => btn.disabled = false);
      updateAnswerWord();
      document.querySelector(`[data-answer="${answerSelectedIndex}"]`)?.focus();
    }, 1800);
  }
}

document.addEventListener("keydown", e => {
  if (document.getElementById("screenExercise").classList.contains("hidden")) return;
  onAnswerKeydown(e);
});

function showQuestion() {
  if (sessionIndex >= sessionWords.length) { finishSession(); return; }
  const word = sessionWords[sessionIndex];

  document.getElementById("exerciseTitle").textContent = wordsData[sessionTopicSlug].title;
  updateExerciseProgress();

  answerOptions = word.wheel_options;
  answerSelectedIndex = -1;
  answerSelectionMode = "none";
  answerState = "idle";
  renderAnswerButtons();
  updateAnswerWord();
}

function finishSession() {
  document.getElementById("screenExercise").classList.add("hidden");
  document.getElementById("screenExplain")?.classList.add("hidden");
  document.getElementById("screenMain").classList.add("hidden");

  const errors = uniqueWords(sessionMistakes);
  lastErrorsForReview = errors.slice();
  const hasErrors = errors.length > 0;
  const resultMode = isReviewMode && !hasErrors ? "finished" : (hasErrors ? "error" : "success");

  renderResultScreen(resultMode, errors);
  isReviewMode = false;
  updateTrainerCabinetSummary();
}

function uniqueWords(words) {
  const seen = new Set();
  return words.filter(word => {
    if (!word || seen.has(word.word_id)) return false;
    seen.add(word.word_id);
    return true;
  });
}

function startReviewSession() {
  const topic = wordsData[sessionTopicSlug];
  if (!topic) return;
  const words = getReviewWordsForCurrentSession();
  if (!words.length) {
    renderResultScreen("finished", []);
    return;
  }

  sessionWords = words.slice(0, SESSION_WORD_LIMIT);
  sessionIndex = 0;
  sessionMistakes = [];
  sessionAnsweredIndexes = new Set();
  isReviewMode = true;
  document.getElementById("screenResult").classList.add("hidden");
  document.getElementById("screenMain").classList.add("hidden");

  if (topic.mechanic === "explain") {
    ensureExplainScreen();
    document.getElementById("screenExercise").classList.add("hidden");
    document.getElementById("screenExplain").classList.remove("hidden");
    document.getElementById("explainProgressFill").style.width = "0%";
    syncExplainShortcutsHint();
    showExplainQuestion();
  } else {
    document.getElementById("screenExplain")?.classList.add("hidden");
    document.getElementById("screenExercise").classList.remove("hidden");
    updateExerciseProgress();
    showQuestion();
  }
}

function getReviewWordsForCurrentSession() {
  const topic = wordsData[sessionTopicSlug];
  if (!topic) return [];
  const wordsById = new Map(topic.words.map(word => [word.word_id, word]));
  const source = lastErrorsForReview.length
    ? lastErrorsForReview
    : getUnresolvedWordsByTopic(sessionTopicSlug).map(item => wordsById.get(item.word_id)).filter(Boolean);
  return uniqueWords(source.map(word => wordsById.get(word.word_id) || word).filter(Boolean));
}

function startExplainTopic(topicSlug) {
  ensureExplainScreen();
  sessionTopicSlug = topicSlug;
  sessionWords = buildSessionWords(topicSlug);
  if (!sessionWords.length) { alert("В этой теме пока нет слов."); return; }

  document.getElementById("screenExplain").classList.remove("hidden");

  syncExplainShortcutsHint();
  showExplainQuestion();

function renderExplainWord(word) {
  const raw = word.word_display || "";
  const highlighted = raw.match(/\[(.)\]/);
  let html;
  if (highlighted) {
    const idx = highlighted.index;
    const before = raw.slice(0, idx);
    const letter = highlighted[1];
    const after = raw.slice(idx + highlighted[0].length);
    html = `${escHtml(before)}<span class="explain-highlight">${escHtml(letter)}</span>${escHtml(after)}`;
  } else {
    html = escHtml(raw.replace("_", word.correct_letter || ""));
  }
  return `<div id="explainWord" class="explain-word">${html}</div>`;
}

function showExplainQuestion() {
  ensureExplainScreen();
  if (sessionIndex >= sessionWords.length) { finishSession(); return; }
  const word = sessionWords[sessionIndex];
  const title = wordsData[sessionTopicSlug]?.title || "Орфограммы";
  document.getElementById("explainTitle").textContent = title;
  updateExplainProgress();
  document.getElementById("explainWordWrap").innerHTML = renderExplainWord(word);

  explainLocked = false;
  explainSelectedIndex = -1;
  explainSelectionMode = "none";
  explainOptions = shuffleArray([
    { text: word.correct_rule, correct: true },
    ...((word.wrong_rules || []).map(text => ({ text, correct: false })))
  ].filter(opt => opt.text));

  renderExplainOptions();
}

function renderExplainOptions() {
  const wrap = document.getElementById("explainOptions");
  wrap.innerHTML = explainOptions.map((opt, i) => `
    <button type="button" class="explain-opt option-enter${explainSelectionMode === "keyboard" && i === explainSelectedIndex ? " active" : ""}" data-explain-answer="${i}" style="animation-delay:${i * 20}ms">
      ${escHtml(opt.text)}

  `).join("");
  wrap.querySelectorAll(".explain-opt").forEach(btn => {
    btn.addEventListener("click", () => selectExplainAnswer(Number(btn.dataset.explainAnswer), true, "pointer"));

  });
}

function updateExplainButtons() {
  document.querySelectorAll(".explain-opt").forEach((btn, i) => {
    btn.classList.toggle("active", explainSelectionMode === "keyboard" && i === explainSelectedIndex);
  });
}

function selectExplainAnswer(index, shouldSubmit, mode = "keyboard") {
  if (explainLocked || index < 0 || index >= explainOptions.length) return;
  explainSelectedIndex = index;
  explainSelectionMode = mode;
  updateExplainButtons();
  document.querySelector(`[data-explain-answer="${index}"]`)?.focus();

function selectExplainNext() {
  const next = explainSelectedIndex < 0 ? 0 : (explainSelectedIndex + 1) % explainOptions.length;
  selectExplainAnswer(next, false, "keyboard");
}

function selectExplainPrev() {
  const prev = explainSelectedIndex < 0 ? explainOptions.length - 1 : (explainSelectedIndex - 1 + explainOptions.length) % explainOptions.length;
  selectExplainAnswer(prev, false, "keyboard");
}

function onExplainKeydown(e) {
  if (!isDesktopNavigation() || explainLocked) return;
  if (e.key === "ArrowRight" || e.key === "ArrowDown") { e.preventDefault(); selectExplainNext(); }
  else if (e.key === "ArrowLeft" || e.key === "ArrowUp") { e.preventDefault(); selectExplainPrev(); }
  else if (e.key === "Enter" || e.key === " ") {
    if (explainSelectedIndex < 0) return;
    e.preventDefault();
    explainAnswer(explainSelectedIndex);
  }
}

function explainAnswer(index) {
  if (explainLocked) return;
  const word = sessionWords[sessionIndex];
  const opt = explainOptions[index];
  const selected = document.querySelector(`[data-explain-answer="${index}"]`);
  if (!word || !opt || !selected) return;
  if (selected.disabled) return;

  const isCorrect = Boolean(opt.correct);
  selected.classList.remove("active");
  selected.classList.add(isCorrect ? "correct" : "wrong");
  selected.disabled = true;

  if (isCorrect) {
    explainLocked = true;
    markWordAsSeen(word, true);
    registerAnsweredWord();
    document.querySelectorAll(".explain-opt").forEach((btn, i) => {
      btn.disabled = true;
      if (i !== index) btn.classList.add("dim");
    });
    setTimeout(() => { sessionIndex++; showExplainQuestion(); }, 1200);
  } else {
    markWordAsSeen(word, false);
    sessionMistakes.push(word);
    setTimeout(() => {
      selected.classList.remove("wrong");
      selected.disabled = false;
      updateExplainButtons();
    }, 400);
  }
}

document.addEventListener("keydown", e => {
  const screen = document.getElementById("screenExplain");
  if (!screen || screen.classList.contains("hidden")) return;
  onExplainKeydown(e);
});

// ── сохранение прогресса по слову — тот же паттерн, что в тренажёре ударений ──
function registerTrainingVisitIfNeeded() {
  if (!currentStudentId) return;
  const flagKey = `orfo_visitCounted_${currentStudentId}`;
  if (sessionStorage.getItem(flagKey)) return;
  sessionStorage.setItem(flagKey, "1");

  db.collection("students").doc(currentStudentId)
    .collection("trainerProgress").doc("orfogrammy")
    .set(
      { trainingCount: firebase.firestore.FieldValue.increment(1) },
      { merge: true }
    )
    .catch(e => console.warn("Не удалось увеличить счётчик заходов", e));
}

function markWordAsSeen(word, isCorrect) {
  registerTrainingVisitIfNeeded();
  const seenWords = getSeenWords();
  const previous = getSeenWordEntry(seenWords, word) || {};
  const previousStreak = Number(previous.correct_streak || 0);
  const correctStreak = isCorrect ? previousStreak + 1 : 0;
  const needsReview = isCorrect
    ? (correctStreak < REVIEW_CORRECT_STREAK && Boolean(previous.needs_review))
    : true;

  const updated = {
    ...previous,
    word_id: word.word_id,
    topic_slug: word.topic_slug,
    display_word: buildDisplayWord(word),
    problem_display_word: buildProblemDisplayWord(word),
    seen: true,
    seen_count: Number(previous.seen_count || 0) + 1,
    correct_count: Number(previous.correct_count || 0) + (isCorrect ? 1 : 0),
    wrong_count: Number(previous.wrong_count || 0) + (isCorrect ? 0 : 1),
    correct_streak: correctStreak,
    needs_review: needsReview,
    last_answer_correct: isCorrect,
    last_seen_at: new Date().toISOString()
  };

  seenWords[word.word_id] = updated;
  saveSeenWords(seenWords);
  saveWordProgressToFirebase(updated);
}

async function saveWordProgressToFirebase(entry) {
  try {
    await db.collection("students").doc(currentStudentId)
      .collection("trainerProgress").doc("orfogrammy")
      .collection("wordProgress").doc(entry.word_id)
      .set(entry, { merge: true });
  } catch (e) {
    console.warn("Не удалось сохранить прогресс в Firebase, локально сохранено", e);
  }
}

async function updateTrainerCabinetSummary() {
  if (!currentStudentId) return;

  const seen = getSeenWords();
  let totalWords = 0;
  let totalSeen = 0;
  const topics = [];

  Object.keys(wordsData).forEach(topicSlug => {
    const topic = wordsData[topicSlug];
    const words = topic.words;
    totalWords += words.length;

    let seenCount = 0;
    let attemptedCount = 0;
    let needsReviewCount = 0;
    let lastSolvedAtMs = 0;

    words.forEach(word => {
      const entry = getSeenWordEntry(seen, word);
      if (!entry) return;
      seenCount++;
      attemptedCount++;
      if (isUnresolved(entry)) needsReviewCount++;
      const ts = Date.parse(entry.last_seen_at || "");
      if (!Number.isNaN(ts) && ts > lastSolvedAtMs) lastSolvedAtMs = ts;
    });

    totalSeen += seenCount;
    if (seenCount === 0) return; // тему, которую ещё не трогали, в topics не кладём

    topics.push({
      name: topic.title,
      slug: topicSlug,
      category: topic.tabTitle,
      seenCount,
      totalCount: words.length,
      percent: attemptedCount > 0
        ? Math.round((needsReviewCount / attemptedCount) * 100)
        : null,
      lastSolvedAt: lastSolvedAtMs ? new Date(lastSolvedAtMs).toISOString() : null
    });
  });

  const summary = {
    name: "Орфография",
    url: "orfogrammy.html",
    completedPercent: totalWords ? Math.round((totalSeen / totalWords) * 100) : 0,
    topics
  };

  try {
    await db.collection("students").doc(currentStudentId)
      .collection("trainerProgress").doc("orfogrammy")
      .set(summary, { merge: true });
  } catch (e) {
    console.warn("Не удалось обновить сводку для кабинета тьютора", e);
  }
}

function escHtml(s) { return (s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function logout() {
  clearCode();
  document.getElementById("screenMain").classList.add("hidden");
  document.getElementById("screenExercise").classList.add("hidden");
  document.getElementById("screenExplain")?.classList.add("hidden");
  document.getElementById("screenResult").classList.add("hidden");
  document.getElementById("screenLogin").classList.remove("hidden");
}

async function showMain() {
  setLoading(true);
  document.getElementById("screenLogin").classList.add("hidden");
  document.getElementById("screenExercise").classList.add("hidden");
  document.getElementById("screenExplain")?.classList.add("hidden");
  document.getElementById("screenResult").classList.add("hidden");
  document.getElementById("screenMain").classList.remove("hidden");
  renderStudentPill();
  try {
    await loadWordsFromSheet();
    await loadSeenWordsFromFirebase(currentStudentId);
  } catch (e) {
    console.error(e);
  }
  renderTopicFilters();
  renderTopicsGrid();
  setLoginLoading(false);
  setLoading(false);
}

const codeInput = document.getElementById("codeInput");
const codeInputWrap = codeInput.closest(".code-input-wrap");

function syncCodeCaret() {
  codeInputWrap.classList.toggle("is-empty", codeInput.value.length === 0);
}

document.getElementById("loginBtn").onclick = () => loginWithCode(codeInput.value);
codeInput.addEventListener("input", syncCodeCaret);
codeInput.addEventListener("keydown", e => {
  if (e.key === "Enter") loginWithCode(e.target.value);
});
syncCodeCaret();

// автологин, если код уже сохранён на этом устройстве
auth.onAuthStateChanged(user => {
  const saved = getSavedCode();
  if (saved && user) {
    currentStudentId = saved;
    showMain();
  }
});
